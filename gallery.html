<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="معرض أعمال متجاوب مع أزرار فلترة تفاعلية حسب التصنيف باستخدام JavaScript." />
  <title>المعرض | مشروع الويب التفاعلي</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="css/base.css" rel="stylesheet" />
  <link href="css/gallery.css" rel="stylesheet" />
</head>
<body class="dark-mode">

  <header>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">المنصّة</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-label="فتح القائمة">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="index.html">الرئيسية</a></li>
            <li class="nav-item"><a class="nav-link" href="blog.html">المدونة</a></li>
            <li class="nav-item"><a class="nav-link active" href="gallery.html">المعرض</a></li>
            <li class="nav-item"><a class="nav-link" href="resume.html">السيرة الذاتية</a></li>
          </ul>
          <button id="darkToggle" class="btn btn-outline-light btn-sm" onclick="toggleDarkMode()">الوضع الليلي</button>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <section class="container py-5">
      <div class="text-center mb-4">
        <h1 class="fw-bold">معرض الأعمال</h1>
        <p class="text-muted">استخدم الأزرار لفلترة الصور حسب التصنيف</p>
      </div>

      <div class="text-center mb-4">
        <button class="btn btn-outline-secondary filter-btn active m-1" onclick="filterGallery('all', this)">الكل</button>
        <button class="btn btn-outline-secondary filter-btn m-1" onclick="filterGallery('nature', this)">طبيعة</button>
        <button class="btn btn-outline-secondary filter-btn m-1" onclick="filterGallery('city', this)">مدن</button>
        <button class="btn btn-outline-secondary filter-btn m-1" onclick="filterGallery('tech', this)">تقنية</button>
      </div>

      <div class="row g-4">
        <div class="col-12 col-sm-6 col-lg-4 gallery-item" data-category="nature">
          <div class="card"><img src="https://picsum.photos/id/1018/600/400" alt="طبيعة" /><div class="card-body"><span class="badge badge-cat">طبيعة</span></div></div>
        </div>
        <div class="col-12 col-sm-6 col-lg-4 gallery-item" data-category="city">
          <div class="card"><img src="https://picsum.photos/id/1067/600/400" alt="مدينة" /><div class="card-body"><span class="badge badge-cat">مدن</span></div></div>
        </div>
        <div class="col-12 col-sm-6 col-lg-4 gallery-item" data-category="tech">
          <div class="card"><img src="https://picsum.photos/id/0/600/400" alt="تقنية" /><div class="card-body"><span class="badge badge-cat">تقنية</span></div></div>
        </div>
        <div class="col-12 col-sm-6 col-lg-4 gallery-item" data-category="nature">
          <div class="card"><img src="https://picsum.photos/id/1015/600/400" alt="طبيعة" /><div class="card-body"><span class="badge badge-cat">طبيعة</span></div></div>
        </div>
        <div class="col-12 col-sm-6 col-lg-4 gallery-item" data-category="city">
          <div class="card"><img src="https://picsum.photos/id/1031/600/400" alt="مدينة" /><div class="card-body"><span class="badge badge-cat">مدن</span></div></div>
        </div>
        <div class="col-12 col-sm-6 col-lg-4 gallery-item" data-category="tech">
          <div class="card"><img src="https://picsum.photos/id/2/600/400" alt="تقنية" /><div class="card-body"><span class="badge badge-cat">تقنية</span></div></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="text-center py-4 mt-4">
    <div class="container">
      <p class="mb-1">© 2026 المنصّة الرقمية — جميع الحقوق محفوظة</p>

      <a href="gallery.html">المعرض</a> ·

    </div>
